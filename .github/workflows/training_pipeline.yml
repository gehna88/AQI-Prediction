# .github/workflows/training_pipeline.yml
#
# Runs once daily at 02:00 UTC via GitHub's native cron scheduler.
# Daily granularity means a 30-minute queue delay is irrelevant,
# so cron-job.org is not needed here.
#
# requirements.txt must be committed to the REPO ROOT for pip cache to work.
# Place it at: your-repo/requirements.txt (not inside a subfolder).

name: Training Pipeline (daily)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          # cache: "pip" requires requirements.txt in the repo root.
          # Only uncomment this after you have committed requirements.txt.
          # cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training pipeline
        run: python pipelines/training_pipeline.py
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}