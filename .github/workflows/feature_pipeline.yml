# .github/workflows/feature_pipeline.yml
#
# Runs every hour. Two trigger mechanisms work together:
#
#   1. schedule (cron): GitHub's built-in scheduler. Free-tier repos often
#      experience 15-60 min delays and GitHub silently disables schedules
#      after 60 days of repo inactivity. Keep this as a fallback.
#
#   2. workflow_dispatch: Allows an external service to trigger this workflow
#      instantly via the GitHub API. Set up cron-job.org to call the dispatch
#      URL every hour — this guarantees on-time execution regardless of
#      GitHub queue pressure.
#
# HOW TO SET UP cron-job.org (one-time):
#   a) Go to https://cron-job.org and create a free account.
#   b) Create a new cron job with:
#        URL:    https://api.github.com/repos/YOUR_USERNAME/YOUR_REPO/actions/workflows/feature_pipeline.yml/dispatches
#        Method: POST
#        Headers:
#          Accept: application/vnd.github+json
#          Authorization: Bearer YOUR_GITHUB_PAT
#          Content-Type: application/json
#        Body:   {"ref":"main"}
#        Schedule: every hour (e.g. 0 * * * *)
#   c) YOUR_GITHUB_PAT must have the 'repo' scope (Actions write permission).
#      Generate it at: GitHub → Settings → Developer settings → Personal access tokens
#   d) Keep the schedule cron below as a fallback in case cron-job.org is down.

name: Feature Pipeline (hourly)

on:
  schedule:
    - cron: "0 * * * *"    # fallback: GitHub's own scheduler (may be delayed)
  workflow_dispatch:         # primary: triggered on-time by cron-job.org

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"         # caches pip packages between runs (faster installs)

      - name: Install dependencies
        # tensorflow excluded here — feature pipeline does not need it.
        # This keeps the install fast (~30s vs ~3min with tensorflow).
        run: |
          pip install \
            "numpy>=1.26,<3" \
            "pandas>=2.1,<3" \
            "pyarrow>=14.0" \
            "requests>=2.31" \
            "hopsworks==4.7.*" \
            "confluent-kafka>=2.3" \
            "python-dotenv>=1.0"

      - name: Run feature pipeline
        run: python pipelines/feature_pipeline.py
        env:
          HOPSWORKS_API_KEY:  ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT:  ${{ secrets.HOPSWORKS_PROJECT }}