# .github/workflows/feature_pipeline.yml
#
# Triggered exclusively by cron-job.org via workflow_dispatch.
# No schedule block — cron-job.org is the sole trigger to guarantee
# on-time execution (GitHub's native cron delays by 15-60 min on free tier).
#
# HOW TO SET UP cron-job.org (one-time):
#   1. Go to https://cron-job.org, create a free account
#   2. Create a new cron job:
#        URL:     https://api.github.com/repos/YOUR_USERNAME/YOUR_REPO/actions/workflows/feature_pipeline.yml/dispatches
#        Method:  POST
#        Headers: Accept: application/vnd.github+json
#                 Authorization: Bearer YOUR_GITHUB_PAT
#                 Content-Type: application/json
#        Body:    {"ref":"main"}
#        Schedule: every hour (0 * * * *)
#   3. Generate YOUR_GITHUB_PAT at:
#        GitHub → Settings → Developer settings → Personal access tokens
#        Scope required: repo (Actions write)

name: Feature Pipeline (hourly)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Spark materialization + Hudi compaction can take up to 15 min
                         # on large feature groups (4000+ rows). 20 min is safe ceiling.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          # No cache: "pip" here — we install packages directly,
          # not from a requirements.txt, so the cache lookup would fail.

      - name: Install dependencies
        # tensorflow excluded — feature pipeline does not use it.
        # hopsworks pinned to 4.8.* to match local development environment.
        # CRITICAL: hopsworks 4.7.* on CI uses the Kafka streaming insert
        # path which does NOT trigger offline materialization even with
        # wait_for_job=True in some configurations. hopsworks 4.8.* client
        # with 4.7.2 server falls back to the batch insert path (same as
        # running locally) which ALWAYS triggers offline materialization.
        # This is why local runs showed materialization but CI runs did not.
        run: |
          pip install \
            "numpy>=1.26,<3" \
            "pandas>=2.1,<3" \
            "pyarrow>=14.0" \
            "requests>=2.31" \
            "hopsworks==4.8.*" \
            "confluent-kafka>=2.3" \
            "pymongo>=4.6" \
            "python-dotenv>=1.0"

      - name: Run feature pipeline
        run: python pipelines/feature_pipeline.py
        env:
          HOPSWORKS_API_KEY:    ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT:    ${{ secrets.HOPSWORKS_PROJECT }}
          OPENWEATHER_API_KEY:  ${{ secrets.OPENWEATHER_API_KEY }}
          MONGODB_URI:          ${{ secrets.MONGODB_URI }}